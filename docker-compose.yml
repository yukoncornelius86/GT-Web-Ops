services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
  n8n:
    image: n8nio/n8n:latest
    ports: ["${N8N_PORT:-5678}:5678"]
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      TZ: ${TZ}
    depends_on: [postgres]
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n/workflows:/workflows
      - ./infra/n8n/logs:/logs
  blog-studio:
    build: ./blog-studio
    ports: ["${BLOG_STUDIO_PORT:-8787}:8787"]
    volumes:
      - ./:/workspace
    environment:
      BLOG_STUDIO_PORT: ${BLOG_STUDIO_PORT}
      BLOG_STUDIO_REPO_PATH: /workspace
      BLOG_STUDIO_SECRET_KEY: ${BLOG_STUDIO_SECRET_KEY}
  static-preview:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./sites/thegtcafe:/usr/share/nginx/html:ro
  caddy-local:
    image: caddy:2
    volumes:
      - ./infra/caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
    ports: ["8088:80"]
  portainer:
    image: portainer/portainer-ce:latest
    profiles: [tools]
    ports: ["9000:9000"]
    volumes: [ /var/run/docker.sock:/var/run/docker.sock, portainer_data:/data ]
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    profiles: [tools]
    ports: ["3001:3001"]
    volumes: [ uptime_kuma_data:/app/data ]
volumes:
  postgres_data:
  n8n_data:
  portainer_data:
  uptime_kuma_data:
