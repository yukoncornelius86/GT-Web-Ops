{% extends "base.html" %}{% block content %}<h1>Editor</h1><form method='post' action='/save'><input name='title' value='{{post.title}}' placeholder='title' required><input name='slug' value='{{post.slug}}' placeholder='slug'><input name='category' value='{{post.category}}' placeholder='category'><input name='tags' value='{{post.tags|join(",") if post.tags else ""}}' placeholder='tags comma'><select name='status'><option {% if post.status=='draft' %}selected{% endif %}>draft</option><option {% if post.status=='published' %}selected{% endif %}>published</option><option {% if post.status=='archived' %}selected{% endif %}>archived</option></select><textarea name='excerpt' placeholder='excerpt'>{{post.excerpt}}</textarea><textarea name='body' rows='18' placeholder='markdown body'>{{post.body}}</textarea><button>Save Draft/Publish</button></form>{% endblock %}
