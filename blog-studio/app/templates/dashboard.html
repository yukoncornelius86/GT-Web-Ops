{% extends "base.html" %}{% block content %}
<h1>Dashboard</h1>
<div class='card'>
<p><b>Selected Site:</b> {{cfg.active_site}}</p>
<p><b>Total:</b> {{posts|length}} | <b>Published:</b> {{published}} | <b>Drafts:</b> {{drafts}} | <b>Archived:</b> {{archived}}</p>
<p><b>Branch:</b> {{branch}}</p><p><b>Last Commit:</b> {{last_commit}}</p>
<pre>{{git_status}}</pre>
<form method='post' action='/export'><button>Export Static Files</button></form>
</div>
{% endblock %}
